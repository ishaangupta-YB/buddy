name: Buddy
options:
  bundleIdPrefix: com.ishaangupta
  deploymentTarget:
    macOS: "14.2"
  createIntermediateGroups: true

packages:
  BuddyKit:
    path: BuddyKit

targets:
  Buddy:
    type: application
    platform: macOS
    sources:
      - path: Buddy/Sources
      - path: Buddy/Resources
        buildPhase: resources
        excludes:
          - "Info.plist"
          - "Buddy.entitlements"
      - path: Buddy/Assets.xcassets
    dependencies:
      - package: BuddyKit
        product: BuddyKit
    info:
      path: Buddy/Resources/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ishaangupta.buddy
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        CODE_SIGN_ENTITLEMENTS: Buddy/Resources/Buddy.entitlements
        ENABLE_HARDENED_RUNTIME: true
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
