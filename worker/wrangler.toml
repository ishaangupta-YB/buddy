name = "buddy-proxy"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Bind Cloudflare Workers AI so the proxy runs models without any API token in the data path.
[ai]
binding = "AI"

[vars]
# The default chat model. Overridable per request, but only within the allowlist in src/index.ts.
DEFAULT_CHAT_MODEL = "@cf/moonshotai/kimi-k2.7-code"

# Secrets (set with `npx wrangler secret put <NAME>`), never committed:
#   BUDDY_PROXY_SECRET — shared bearer secret the macOS app sends as `Authorization: Bearer <secret>`.
